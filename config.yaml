# ═══════════════════════════════════════════════════════════
# Motion-Triggered Recording Pipeline Configuration
# ═══════════════════════════════════════════════════════════

# Camera Credentials & Connection
# Secrets can be overridden via .env using SURVEILLANCE_ prefix:
#   SURVEILLANCE_CAMERA__IP, SURVEILLANCE_CAMERA__USER, SURVEILLANCE_CAMERA__PASSWORD
camera:
  # Camera IP Address — set to null for auto-discovery via network scan
  ip: null
  # Camera Account (created in Tapo app > Camera Settings > Advanced > Camera Account)
  user: ""
  password: ""

# Network Scanner Settings (used for auto-discovering camera IP)
network:
  # Ports to scan when searching for cameras on the local network
  camera_ports: [80, 554, 8080, 8000, 8899, 88, 8554, 37777]
  # Ports that indicate an RTSP-capable camera
  rtsp_ports: [554, 8554]
  # Socket connection timeout in seconds
  scan_timeout: 1.5
  # Thread pool size for parallel scanning
  max_workers: 100
  # IP range to scan (last octet)
  ip_range_start: 1
  ip_range_end: 255

# Camera RTSP Stream Settings
stream:
  # stream1 = HD (1080p), stream2 = SD (480p)
  stream_path: "/stream1"
  rtsp_port: 554
  # How many frames per second to process (lower = less CPU)
  # The actual stream may be 15-30fps, but we only analyze this many
  process_fps: 5
  # Timeout for RTSP connection (seconds)
  connection_timeout: 10
  # Max reconnection attempts before giving up (0 = infinite)
  max_reconnect_attempts: 0
  # Delay between reconnection attempts (seconds)
  reconnect_delay: 5

# Motion Detection Settings
motion:
  # Pixel difference threshold (0-255)
  # Lower = more sensitive to small changes, Higher = only detect big changes
  sensitivity: 25
  # Gaussian blur kernel size (must be odd number)
  # Helps reduce noise-triggered false positives
  blur_kernel: 21
  # Minimum percentage of frame that must change to count as motion (0.0-100.0)
  # e.g., 0.5 means 0.5% of pixels must differ
  min_motion_area_pct: 0.5
  # Minimum contour area in pixels to count as motion
  # Helps filter out tiny noise-based changes
  min_contour_area: 500

# Recording Settings
recording:
  # Output directory for recorded clips
  output_dir: "./recordings"
  # Video codec: "mp4v" (MPEG-4), "avc1" (H.264), "XVID" (AVI)
  codec: "mp4v"
  # Output file extension
  file_extension: ".mp4"
  # Pre-buffer: seconds of footage to keep BEFORE motion starts
  pre_buffer_seconds: 3
  # Post-buffer: seconds to continue recording AFTER motion stops
  post_buffer_seconds: 10
  # Maximum recording duration in seconds (safety limit)
  max_recording_seconds: 300
  # Add timestamp overlay on recorded video
  timestamp_overlay: true
  # Timestamp font scale (relative to frame size)
  timestamp_font_scale: 0.7
  # Timestamp position: "top-left", "top-right", "bottom-left", "bottom-right"
  timestamp_position: "bottom-left"
  # Timestamp color (B, G, R)
  timestamp_color: [255, 255, 255]
  # Timestamp background color (B, G, R) - semi-transparent box behind text
  timestamp_bg_color: [0, 0, 0]

# Logging Settings
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  # Log to file (in addition to console)
  log_to_file: true
  log_file: "./logs/surveillance.log"

# ═══════════════════════════════════════════════════════════
# Video Processing Configuration
# ═══════════════════════════════════════════════════════════

# Video Processing Settings
# Uses OPENAI_API_KEY from .env for AI-powered analysis
video_processing:
  # Face Detection Settings
  face_detection:
    model_path: "video_processing/face_detection_yunet_2023mar.onnx"
    score_threshold: 0.5  # Minimum confidence for face detection (0.0-1.0)
    nms_threshold: 0.3    # Non-maximum suppression threshold
    top_k: 5000           # Maximum number of faces to detect

  # Face Recognition Settings
  face_recognition:
    model_path: "video_processing/face_recognition_sface_2021dec.onnx"
    match_threshold: 0.36  # Cosine similarity threshold for matching (0.0-1.0)
    known_faces_dir: "video_processing/known_faces"

  # Video Analysis Settings
  video_analysis:
    sample_interval_seconds: 2  # Sample frames every N seconds
    max_frames_per_analysis: 10 # Maximum frames to send to AI for analysis
    resize_width: 640           # Resize frame width before sending to AI
    resize_height: 480          # Resize frame height before sending to AI
    ai_model: "gpt-4o"          # OpenAI model to use for analysis
    ai_detail_level: "low"      # Image detail level: "low", "high", or "auto"

  # WhatsApp Notification Settings (via OpenClaw)
  # Uses WHATSAPP_TARGET_NUMBER from .env
  whatsapp_notification:
    enabled: true               # Enable WhatsApp notifications
    target_number: "+917719987767"           # WhatsApp number in E.164 format (e.g., +1234567890)
                                # Can be set here or via WHATSAPP_TARGET_NUMBER in .env
    channel: "whatsapp"         # OpenClaw channel (whatsapp, telegram, etc.)
    send_on_trigger: true       # Send notification when unknown individuals detected
